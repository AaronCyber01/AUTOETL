<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthetic Frontier | Data Lifecycle Master Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:white;color:red;padding:20px;font-size:20px;width:100%;height:100%';
        el.innerHTML = '<h1>Error</h1><pre>' + e.message + '\n' + (e.error ? e.error.stack : '') + '</pre>';
        document.body.appendChild(el);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:white;color:red;padding:20px;font-size:20px;width:100%;height:100%';
        el.innerHTML = '<h1>Unhandled Promise</h1><pre>' + e.reason + '</pre>';
        document.body.appendChild(el);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
